<!DOCTYPE html>
<html>
  <head>
    <title>My page</title>
    <style>
      .flex-container {
        display: flex;
        flex-wrap: nowrap;
        justify-content: center;
        background-color: DodgerBlue;
      }

      .flex-container > div {
        background-color: #f1f1f1;
        width: 100px;
        margin: 10px;
        text-align: center;
        line-height: 75px;
        font-size: 30px;
      }
    </style>
  </head>
  <body>
    <div class="flex-container">
      <h1>Pick a box, but don't touch it!</h1>
    </div>

    <div class="flex-container">
      <div>1</div>
      <div>2</div>
      <div>3</div>
    </div>

    <div class="flex-container">
      <h1>Choose wisely!!</h1>
    </div>

    <div class="flex-container">
      <p>You can't click on them yet.</p>
    </div>

    <div class="flex-container">
      <p>Try to resize the browser window.</p>
    </div>
    <div class="flex-container">
      <p>A container with "flex-wrap: nowrap;" will never wrap its items.</p>
    </div>
    <div class="flex-container">
      <p>
        <strong>Note:</strong> Flexbox is not supported in Internet Explorer 10
        or earlier versions.
      </p>
    </div>
  </body>
</html>
